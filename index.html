<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>学習ポータル ToDo</title>
  <link rel="stylesheet" href="style.css?v=17">
</head>
<body>
  <header class="app-header">
    <h1>📚 学習ポータル ToDo</h1>
    <div class="week-nav">
      <button id="prevWeek" class="week-btn" aria-label="前の週">‹</button>
      <div class="week-label">
        <span id="weekRange">―</span>
        <span id="weekTag" class="week-tag"></span>
      </div>
      <button id="nextWeek" class="week-btn" aria-label="次の週">›</button>
      <button id="thisWeek" class="this-week-btn">今週へ</button>
    </div>
    <div class="overall">
      <div class="overall-bar"><div id="overallFill" class="overall-fill"></div></div>
      <span id="overallText" class="overall-text">0%</span>
    </div>
    <div id="syncStatus" class="sync-status off">● この端末内に保存</div>
  </header>

  <main id="board" class="board"><!-- 教科カードがJSで描画されます --></main>

  <footer class="app-footer">
    <p class="note">クラウド同期を設定すると、家族で同じ進捗をどの端末からも見られます（未設定時はこの端末内に保存）。</p>
  </footer>

  <script src="app.js?v=17"></script>
</body>
</html>
