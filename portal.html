<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>学習ポータル</title>
  <link rel="stylesheet" href="style.css?v=22">
  <style>
    /* ---- 上部ランチャー（アプリアイコン：横長・ラベル大きめ） ---- */
    .portal-top { max-width: 1200px; margin: 0 auto; padding: 16px 16px 8px; }
    .portal-top h1 { font-size: 23px; margin: 0 0 14px; }   /* 学習ポータル＝大きめ */
    .launcher {
      display: grid;
      gap: 12px 6px;
      grid-template-columns: repeat(auto-fill, minmax(86px, 1fr)); /* 縦向き等は折り返し */
    }
    @media (min-width: 1000px) {            /* iPad横向きは12個を必ず1行 */
      .launcher { grid-template-columns: repeat(12, 1fr); }
    }
    .launch { display: flex; flex-direction: column; align-items: center; gap: 6px; text-decoration: none; -webkit-tap-highlight-color: transparent; }
    .launch-icon {
      width: 100%; max-width: 104px; aspect-ratio: 5 / 4;   /* 横に幅広 */
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; box-shadow: 0 1px 4px rgba(0,0,0,.10);
    }
    .launch:active .launch-icon { transform: scale(.93); }
    .launch-label { font-size: 13px; font-weight: 700; color: #475569; text-align: center; line-height: 1.2; }
    .launch.blue   .launch-icon { background: #dbeafe; }
    .launch.green  .launch-icon { background: #dcfce7; }
    .launch.orange .launch-icon { background: #ffedd5; }
    .launch.red    .launch-icon { background: #fee2e2; }
    .launch.purple .launch-icon { background: #ede9fe; }
    .portal-divider { max-width: 1200px; margin: 14px auto 0; border-top: 1px solid var(--line); }

    /* ---- ToDoヘッダー：見出し＋週の日付を1行に（縦幅節約） ---- */
    .app-header .todo-bar { display: flex; align-items: center; gap: 8px 14px; flex-wrap: wrap; margin-bottom: 8px; }
    .app-header .todo-title { font-size: 17px; font-weight: 700; margin: 0; white-space: nowrap; }
    .app-header .todo-bar .week-nav { margin: 0 0 0 auto; }      /* 右寄せ */
    .app-header .todo-bar .this-week-btn { margin-left: 6px; }
    .app-header .overall { margin-top: 0; }
    .app-header .overall .sync-status { margin: 0 0 0 8px; white-space: nowrap; }
  </style>
</head>
<body>
  <!-- ===== 上部：アプリ ランチャー ===== -->
  <div class="portal-top">
    <h1>📚 学習ポータル</h1>
    <div class="launcher">
      <a class="launch blue"   href="https://komaguchi-wq.github.io/math-quiz/"><span class="launch-icon">📐</span><span class="launch-label">SAPIX算数</span></a>
      <a class="launch blue"   href="https://komaguchi-wq.github.io/kobetsuba-web-jugyou/"><span class="launch-icon">📘</span><span class="launch-label">コベツバ</span></a>
      <a class="launch blue"   href="https://komaguchi-wq.github.io/math-quiz/#%E3%81%95%E3%81%A8/machigai-gallery"><span class="launch-icon">❌</span><span class="launch-label">間違い撲滅</span></a>
      <a class="launch blue"   href="https://komaguchi-wq.github.io/math-challenge/"><span class="launch-icon">🔢</span><span class="launch-label">計算</span></a>
      <a class="launch green"  href="https://komaguchi-wq.github.io/science-daily-check/"><span class="launch-icon">🧪</span><span class="launch-label">SAPIX理科</span></a>
      <a class="launch green"  href="https://komaguchi-wq.github.io/science-daily-check-v2/"><span class="launch-icon">🔬</span><span class="launch-label">理科 V2</span></a>
      <a class="launch orange" href="https://komaguchi-wq.github.io/shakai-daily-check/"><span class="launch-icon">🌍</span><span class="launch-label">SAPIX社会</span></a>
      <a class="launch orange" href="https://komaguchi-wq.github.io/shakai-daily-check-v2/"><span class="launch-icon">🗾</span><span class="launch-label">社会 V2</span></a>
      <a class="launch red"    href="https://komaguchi-wq.github.io/kokugo-kotobanavi/"><span class="launch-icon">📖</span><span class="launch-label">言葉ナビ</span></a>
      <a class="launch red"    href="https://komaguchi-wq.github.io/goi1400-training/"><span class="launch-icon">📝</span><span class="launch-label">語彙力</span></a>
      <a class="launch purple" href="https://komaguchi-wq.github.io/sapix-info/"><span class="launch-icon">📋</span><span class="launch-label">SAPIX情報</span></a>
      <a class="launch purple" href="https://komaguchi-wq.github.io/juken-guide/"><span class="launch-icon">🏫</span><span class="launch-label">入試ガイド</span></a>
    </div>
  </div>
  <div class="portal-divider"></div>

  <!-- ===== 下部：今週のやったことリスト（既存アプリと同一・データ共通） ===== -->
  <header class="app-header">
    <div class="todo-bar">
      <h1 class="todo-title">📝 今週のやったことリスト</h1>
      <div class="week-nav">
        <button id="prevWeek" class="week-btn" aria-label="前の週">‹</button>
        <div class="week-label">
          <span id="weekRange">―</span>
          <span id="weekTag" class="week-tag"></span>
        </div>
        <button id="nextWeek" class="week-btn" aria-label="次の週">›</button>
        <button id="thisWeek" class="this-week-btn">今週へ</button>
      </div>
    </div>
    <div class="overall">
      <div class="overall-bar"><div id="overallFill" class="overall-fill"></div></div>
      <span id="overallText" class="overall-text">0%</span>
      <span id="syncStatus" class="sync-status off">● この端末内に保存</span>
    </div>
  </header>

  <main id="board" class="board"><!-- 教科カードがJSで描画されます --></main>

  <section class="bonus-wrap">
    <div class="bonus-card">
      <div class="bonus-head">🌟 ボーナス進捗</div>
      <textarea id="bonusMemo" class="bonus-memo" placeholder="自由メモ：がんばったこと・追加でやったこと・気づいたことなど"></textarea>
    </div>
  </section>

  <footer class="app-footer">
    <p class="note">家族で同じ進捗をどの端末からも見られます（クラウド同期）。</p>
  </footer>

  <script src="app.js?v=23"></script>
</body>
</html>
